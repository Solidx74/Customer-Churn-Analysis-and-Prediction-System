<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Churn Prediction</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background-color: #f0f2f5;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
h2 {
    font-weight: 700;
    color: #2c3e50;
}
.card {
    border-radius: 15px;
}
.form-label {
    font-weight: 500;
}
input.form-control, select.form-control, textarea.form-control {
    border-radius: 10px;
    transition: all 0.3s ease;
}
input.form-control:focus, select.form-control:focus, textarea.form-control:focus {
    border-color: #007bff;
    box-shadow: 0 0 8px rgba(0, 123, 255, 0.25);
}
.btn-primary {
    border-radius: 10px;
    font-weight: 600;
}
.btn-primary:hover {
    background-color: #0056b3;
}
.result-box {
    font-weight: 600;
    font-size: 18px;
    margin-top: 15px;
}
</style>
</head>
<body>

<div class="container py-5">
    <!-- Header -->
    <div class="text-center mb-4">
        <h2>📊 Customer Churn Prediction</h2>
        <p class="text-muted">Fill out the form to predict customer churn</p>
    </div>

    <!-- Form Card -->
    <div class="card shadow p-4 mb-4">
        <form method="POST">
            <div class="row g-3">
                <!-- Inputs -->
                <div class="col-md-4">
                    <label class="form-label">Senior Citizen</label>
                    <input type="number" class="form-control" name="query1" value="{{query1}}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Monthly Charges</label>
                    <input type="number" step="0.01" class="form-control" name="query2" value="{{query2}}">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Total Charges</label>
                    <input type="number" step="0.01" class="form-control" name="query3" value="{{query3}}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Gender</label>
                    <select class="form-control" name="query4">
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Partner</label>
                    <select class="form-control" name="query5">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Dependents</label>
                    <select class="form-control" name="query6">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Phone Service</label>
                    <select class="form-control" name="query7">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Multiple Lines</label>
                    <input type="text" class="form-control" name="query8" value="{{query8}}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Internet Service</label>
                    <select class="form-control" name="query9">
                        <option>DSL</option>
                        <option>Fiber optic</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Online Security</label>
                    <input type="text" class="form-control" name="query10" value="{{query10}}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Online Backup</label>
                    <input type="text" class="form-control" name="query11" value="{{query11}}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Device Protection</label>
                    <input type="text" class="form-control" name="query12" value="{{query12}}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Tech Support</label>
                    <input type="text" class="form-control" name="query13" value="{{query13}}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Streaming TV</label>
                    <input type="text" class="form-control" name="query14" value="{{query14}}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Streaming Movies</label>
                    <input type="text" class="form-control" name="query15" value="{{query15}}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Contract</label>
                    <select class="form-control" name="query16">
                        <option>Month-to-month</option>
                        <option>One year</option>
                        <option>Two year</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Paperless Billing</label>
                    <select class="form-control" name="query17">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Payment Method</label>
                    <input type="text" class="form-control" name="query18" value="{{query18}}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Tenure (months)</label>
                    <input type="number" class="form-control" name="query19" value="{{query19}}">
                </div>
            </div>

            <div class="text-center mt-4">
                <button class="btn btn-primary btn-lg px-5">Predict Churn</button>
            </div>
        </form>
    </div>

    <!-- Prediction Result -->
    {% if output1 %}
    <div class="card shadow p-4">
        <h4 class="text-center mb-3">Prediction Result</h4>
        <div class="alert alert-info text-center result-box">
            {{output1}}
        </div>
        <div class="alert alert-warning text-center result-box">
            {{output2}}
        </div>
    </div>
    {% endif %}

</div>

</body>
</html>
